<!DOCTYPE html>
<html>
<head>
  <title>Trend Cart - Fashion Store</title>
  <style>

    body {
      font-family: Arial;
      margin:0;
      background:#f4f4f4;
      text-align:center;
    }

    h1 {
      background:black;
      color:white;
      padding:15px;
      margin:0;
    }

    /* LOGIN PAGE STYLE */
    #loginPage{
      background:url("https://images.unsplash.com/photo-1521335629791-ce4aec67dd47") no-repeat center center/cover;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .loginBox{
      background:rgba(255,255,255,0.9);
      padding:30px;
      border-radius:10px;
      width:300px;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
    }

    input{
      width:100%;
      padding:8px;
      margin:8px 0;
    }

    button{
      padding:8px;
      width:100%;
      border:none;
      background:black;
      color:white;
      border-radius:5px;
      cursor:pointer;
      margin-top:5px;
    }

    button:hover{ opacity:0.8; }

    .container{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      margin:20px;
    }

    .card{
      background:white;
      padding:15px;
      width:230px;
      border-radius:10px;
      box-shadow:0 5px 10px rgba(0,0,0,0.1);
    }

    .card img{
      width:100%;
      border-radius:10px;
      height:250px;
      object-fit:cover;
    }

    .btnRow{
      display:flex;
      gap:5px;
    }

    .btnRow button{
      width:50%;
    }

    #mainPage, #buyPage, #customizePage, #paymentPage{
      display:none;
    }

  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="loginBox">
    <h2>Welcome to Trend Cart</h2>
    <input type="text" id="name" placeholder="Enter Name">
    <button onclick="enterStore()">Enter Store</button>
  </div>
</div>

<!-- MAIN PAGE -->
<div id="mainPage">
  <h1>Fashion Store</h1>
  <h3 id="welcomeUser"></h3>
  <div id="productList" class="container"></div>
</div>

<!-- BUY PAGE -->
<div id="buyPage">
  <h1>Shipping Details</h1>
  <input type="text" id="address" placeholder="Enter Address">
  <input type="text" id="phone" placeholder="Enter Phone Number">
  <button onclick="goPayment()">Proceed to Payment</button>
</div>

<!-- PAYMENT PAGE -->
<div id="paymentPage">
  <h1>Payment Page</h1>
  <p>Demo Payment Page 💳</p>
  <button onclick="completeOrder()">Pay Now</button>
</div>

<!-- CUSTOMIZE PAGE -->
<div id="customizePage">
  <h1>Customize Dress</h1>
  <p>Select Size:</p>
  <select>
    <option>S</option>
    <option>M</option>
    <option>L</option>
    <option>XL</option>
  </select>
  <p>Select Color:</p>
  <select>
    <option>Red</option>
    <option>Black</option>
    <option>Blue</option>
  </select>
  <button onclick="goHome()">Done</button>
</div>

<script>

  // API Configuration
  const API_URL = 'http://localhost:3000/api';
  let products = [];
  let currentProduct = null;

  // Fetch products from backend
  async function loadProductsFromAPI() {
    try {
      const response = await fetch(`${API_URL}/products`);
      if (response.ok) {
        products = await response.json();
        console.log('✅ Loaded', products.length, 'products from database');
      } else {
        console.error('Failed to load products from API');
        // Fallback to empty array
        products = [];
      }
    } catch (error) {
      console.error('Error connecting to backend:', error);
      alert('⚠️ Cannot connect to backend server. Make sure it\'s running on port 3000');
      products = [];
    }
  }


//////////////////////////////////////////////////

async function enterStore(){
  const name=document.getElementById("name").value;
  if(name===""){ alert("Enter Name"); return; }
  localStorage.setItem("trendUser",name);
  
  // Load products from API
  await loadProductsFromAPI();
  showMain();
}

function showMain(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("buyPage").style.display="none";
  document.getElementById("customizePage").style.display="none";
  document.getElementById("paymentPage").style.display="none";
  document.getElementById("mainPage").style.display="block";

  document.getElementById("welcomeUser").innerText=
    "Welcome, "+localStorage.getItem("trendUser")+" 👗";

  showProducts();
}

//////////////////////////////////////////////////

function showProducts(){
  const container=document.getElementById("productList");
  container.innerHTML="";

  if(products.length === 0){
    container.innerHTML = "<p>Loading products...</p>";
    return;
  }

  products.forEach(p=>{
    container.innerHTML+=`
      <div class="card">
        <img src="${p.image || p.img}" onerror="this.src='https://via.placeholder.com/200x250?text=No+Image'">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <div class="btnRow">
          <button onclick="buyNow('${p._id}')">Buy</button>
          <button onclick="customize('${p._id}')">Customize</button>
        </div>
      </div>
    `;
  });
}

//////////////////////////////////////////////////

function buyNow(productId){
  currentProduct = products.find(p => p._id === productId);
  document.getElementById("mainPage").style.display="none";
  document.getElementById("buyPage").style.display="block";
}

async function goPayment(){
  const address=document.getElementById("address").value;
  const phone=document.getElementById("phone").value;

  if(address===""||phone===""){
    alert("Fill all details");
    return;
  }

  // Save order to backend
  try {
    const orderData = {
      userName: localStorage.getItem("trendUser"),
      phone: phone,
      address: address,
      productId: currentProduct._id,
      totalAmount: currentProduct.price,
      quantity: 1
    };

    const response = await fetch(`${API_URL}/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(orderData)
    });

    if (response.ok) {
      const order = await response.json();
      console.log('✅ Order placed:', order);
      document.getElementById("buyPage").style.display="none";
      document.getElementById("paymentPage").style.display="block";
    } else {
      alert('Failed to place order. Please try again.');
    }
  } catch (error) {
    console.error('Error placing order:', error);
    alert('Cannot connect to server. Order not saved.');
    // Still show payment page for demo
    document.getElementById("buyPage").style.display="none";
    document.getElementById("paymentPage").style.display="block";
  }
}

function completeOrder(){
  alert("Payment Successful 🎉 Order Placed!");
  goHome();
}

//////////////////////////////////////////////////

function customize(productId){
  currentProduct = products.find(p => p._id === productId);
  document.getElementById("mainPage").style.display="none";
  document.getElementById("customizePage").style.display="block";
}

function goHome(){
  showMain();
}

</script>

</body>
</html>
