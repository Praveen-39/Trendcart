<!DOCTYPE html>
<html>
<head>
  <title>Trend Cart - Fashion Store</title>
  <style>

    body {
      font-family: Arial;
      margin:0;
      background:#f4f4f4;
      text-align:center;
    }

    h1 {
      background:black;
      color:white;
      padding:15px;
      margin:0;
    }

    /* LOGIN PAGE STYLE */
    #loginPage{
      background:url("https://images.unsplash.com/photo-1521335629791-ce4aec67dd47") no-repeat center center/cover;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .loginBox{
      background:rgba(255,255,255,0.9);
      padding:30px;
      border-radius:10px;
      width:300px;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
    }

    input{
      width:100%;
      padding:8px;
      margin:8px 0;
    }

    button{
      padding:8px;
      width:100%;
      border:none;
      background:black;
      color:white;
      border-radius:5px;
      cursor:pointer;
      margin-top:5px;
    }

    button:hover{ opacity:0.8; }

    .container{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      margin:20px;
    }

    .card{
      background:white;
      padding:15px;
      width:230px;
      border-radius:10px;
      box-shadow:0 5px 10px rgba(0,0,0,0.1);
    }

    .card img{
      width:100%;
      border-radius:10px;
      height:250px;
      object-fit:cover;
    }

    .btnRow{
      display:flex;
      gap:5px;
    }

    .btnRow button{
      width:50%;
    }

    #mainPage, #buyPage, #customizePage, #paymentPage{
      display:none;
    }

  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="loginBox">
    <h2>Welcome to Trend Cart</h2>
    <input type="text" id="name" placeholder="Enter Name">
    <button onclick="enterStore()">Enter Store</button>
  </div>
</div>

<!-- MAIN PAGE -->
<div id="mainPage">
  <h1>Fashion Store</h1>
  <h3 id="welcomeUser"></h3>
  <div id="productList" class="container"></div>
</div>

<!-- BUY PAGE -->
<div id="buyPage">
  <h1>Shipping Details</h1>
  <input type="text" id="address" placeholder="Enter Address">
  <input type="text" id="phone" placeholder="Enter Phone Number">
  <button onclick="goPayment()">Proceed to Payment</button>
</div>

<!-- PAYMENT PAGE -->
<div id="paymentPage">
  <h1>Payment Page</h1>
  <p>Demo Payment Page 💳</p>
  <button onclick="completeOrder()">Pay Now</button>
</div>

<!-- CUSTOMIZE PAGE -->
<div id="customizePage">
  <h1>Customize Dress</h1>
  <p>Select Size:</p>
  <select>
    <option>S</option>
    <option>M</option>
    <option>L</option>
    <option>XL</option>
  </select>
  <p>Select Color:</p>
  <select>
    <option>Red</option>
    <option>Black</option>
    <option>Blue</option>
  </select>
  <button onclick="goHome()">Done</button>
</div>

<script>

  const products = [
  {
    id:1,
    name:" Brown Dress",
    price:999,
    img:"c://Users//LENOVO//Downloads//first.jpeg"
  },
  {
    id:2,
    name:"Casual Summer Dress",
    price:899,
    img:"c://Users//LENOVO//Downloads//second.jpeg"
  },
  {
    id:3,
    name:"Brown T-shirt",
    price:499,
    img:"c://Users//LENOVO//Downloads//third.jpeg"
  },
  {
    id:4,
    name:"Saree with Blouse",
    price:1499,
    img:"c://Users//LENOVO//Downloads//fourth.jpeg"
  },
  {
    id:5,
    name:"saree",
    price:1599,
    img:"c://Users//LENOVO//Downloads//fivth.jpeg"
  },
  {
    id:6,
    name:"girls's Shirt",
    price:799,
    img:"c://Users//LENOVO//Downloads//WhatsApp Image 2026-02-21 at 12.15.07 PM.jpeg"
  },
  {
    id:7,
    name:"frock",
    price:999,
    img:"c://Users//LENOVO//Downloads//WhatsApp Image 2026-02-21 at 12.23.22 PM.jpeg"
  },
  {
    id:8,
    name:"men's shirt",
    price:899,
    img:"c://Users//LENOVO//Downloads//WhatsApp Image 2026-02-21 at 12.14.50 PM.jpeg"
  },
  {
    id:9,
    name:"Brown Pant",
    price:799,
    img:"c://Users//LENOVO//Downloads//ninth.jpeg"
  },
  {
    id:10,
    name:"White t-shirt",
    price:499,
    img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"
  },
  
];


//////////////////////////////////////////////////

function enterStore(){
  const name=document.getElementById("name").value;
  if(name===""){ alert("Enter Name"); return; }
  localStorage.setItem("trendUser",name);
  showMain();
}

function showMain(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("buyPage").style.display="none";
  document.getElementById("customizePage").style.display="none";
  document.getElementById("paymentPage").style.display="none";
  document.getElementById("mainPage").style.display="block";

  document.getElementById("welcomeUser").innerText=
    "Welcome, "+localStorage.getItem("trendUser")+" 👗";

  showProducts();
}

//////////////////////////////////////////////////

function showProducts(){
  const container=document.getElementById("productList");
  container.innerHTML="";

  products.forEach(p=>{
    container.innerHTML+=`
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <div class="btnRow">
          <button onclick="buyNow()">Buy</button>
          <button onclick="customize()">Customize</button>
        </div>
      </div>
    `;
  });
}

//////////////////////////////////////////////////

function buyNow(){
  document.getElementById("mainPage").style.display="none";
  document.getElementById("buyPage").style.display="block";
}

function goPayment(){
  const address=document.getElementById("address").value;
  const phone=document.getElementById("phone").value;

  if(address===""||phone===""){
    alert("Fill all details");
    return;
  }

  document.getElementById("buyPage").style.display="none";
  document.getElementById("paymentPage").style.display="block";
}

function completeOrder(){
  alert("Payment Successful 🎉 Order Placed!");
  goHome();
}

//////////////////////////////////////////////////

function customize(){
  document.getElementById("mainPage").style.display="none";
  document.getElementById("customizePage").style.display="block";
}

function goHome(){
  showMain();
}

</script>

</body>
</html>
